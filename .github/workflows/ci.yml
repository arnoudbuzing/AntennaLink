name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build library and run test suite
    runs-on: ubuntu-latest

    # The Wolfram Engine image provides wolframscript + the WolframLibrary
    # headers needed to compile the LibraryLink binary. It is free, but each
    # run needs an on-demand license: create a free Wolfram Engine entitlement
    # (https://www.wolfram.com/engine/) and store its ID in a repository secret
    # named WOLFRAMSCRIPT_ENTITLEMENTID (Settings > Secrets and variables >
    # Actions). Without it, wolframscript cannot acquire a license and the job
    # fails at the license-check step below.
    container:
      image: wolframresearch/wolframengine:latest
      options: --user root

    env:
      WOLFRAMSCRIPT_ENTITLEMENTID: ${{ secrets.WOLFRAMSCRIPT_ENTITLEMENTID }}

    steps:
      # git must exist before checkout, otherwise actions/checkout falls back to
      # the REST API tarball, which cannot fetch the nec2c submodule.
      # build-essential provides gcc plus the libc development headers
      # (stdint.h, complex.h, ...) that CreateLibrary needs to compile nec2c.
      - name: Install build tools (git, build-essential)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git build-essential

      - name: Check out repository (with nec2c submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify Wolfram Engine license is configured
        run: |
          if [ -z "$WOLFRAMSCRIPT_ENTITLEMENTID" ]; then
            echo "::error::WOLFRAMSCRIPT_ENTITLEMENTID secret is not set. Create a free Wolfram Engine on-demand entitlement at https://www.wolfram.com/engine/ and add its ID as a repository secret."
            exit 1
          fi

      - name: Report Wolfram version
        run: wolframscript -code '$Version'

      - name: Build libnec2link
        run: wolframscript -file scripts/build.wl

      - name: Diagnose solve (temporary)
        run: |
          wolframscript -code 'PacletDirectoryLoad[FileNameJoin[{Directory[], "AntennaLink"}]]; Needs["ArnoudBuzing`AntennaLink`"]; lib = FindLibrary["libnec2link"]; Print["LIB=", lib]; r = AntennaSolveMemory[{<|"Segments" -> 11, "Tag" -> 1, "P1" -> {0, 0, -0.25}, "P2" -> {0, 0, 0.25}, "Radius" -> 0.001|>}, 299.79, {<|"Tag" -> 1, "Segment" -> 6, "Voltage" -> 1.0|>}]; Print["HEAD=", Head[r]]; If[AssociationQ[r], Print["NCURR=", Length[r["Currents"]]], Print["FAILED=", r]]'

      - name: Run test suite
        run: wolframscript -file scripts/test.wl
